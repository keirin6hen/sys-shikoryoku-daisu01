<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>思考力問題・代数</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#0a2a44;
      --card:#0f172aee;
      --line:#94a3b8;
      --text:#e5e7eb;
      --muted:#cbd5e1;
      --accent:#38bdf8;
      --accent2:#a78bfa;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 18px;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
      color:var(--text);
      min-height:100svh;
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(56,189,248,.25), transparent 60%),
        radial-gradient(900px 650px at 85% 15%, rgba(167,139,250,.22), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:flex;
      justify-content:center;
    }
    .wrap{
      width:min(1100px, 92vw);
      padding:32px 0 28px;
    }
    header{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:18px;
    }
    h1{
      margin:0;
      font-size:clamp(22px, 2.6vw, 34px);
      letter-spacing:.02em;
      line-height:1.15;
    }
    .badge{
      font-size:12px;
      color:var(--muted);
      padding:8px 10px;
      border:1px solid rgba(148,163,184,.35);
      border-radius:999px;
      background:rgba(15,23,42,.35);
      backdrop-filter: blur(8px);
      white-space:nowrap;
    }
    .card{
      background:var(--card);
      border:1px solid rgba(148,163,184,.22);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .section{
      padding:18px 18px 16px;
      border-top:1px solid rgba(148,163,184,.18);
    }
    .section:first-child{ border-top:none; }
    .section h2{
      margin:0 0 12px;
      font-size:16px;
      color:var(--muted);
      letter-spacing:.08em;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .section h2::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:3px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 0 4px rgba(56,189,248,.12);
    }
    .problem-frame{
      border:2px solid rgba(148,163,184,.65);
      border-radius:14px;
      padding:14px;
      background:rgba(2,6,23,.25);
    }
    .problem-frame img{
      display:block;
      width:100%;
      height:auto;
      max-width:100%;
      border-radius:10px;
    }
    .actions{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:12px;
      margin-top:14px;
      flex-wrap:wrap;
    }
    button{
      appearance:none;
      border:none;
      cursor:pointer;
      color:#06121f;
      font-weight:700;
      letter-spacing:.02em;
      padding:12px 16px;
      border-radius:12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 12px 24px rgba(56,189,248,.18);
      transition: transform .08s ease, filter .2s ease;
    }
    button:hover{ filter: brightness(1.05); }
    button:active{ transform: translateY(1px) scale(.99); }
    .hint{
      color:rgba(203,213,225,.85);
      font-size:13px;
    }
    footer{
      margin-top:14px;
      color:rgba(203,213,225,.7);
      font-size:12px;
      text-align:right;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>思考力問題・代数</h1>
      <div class="badge">Problem Viewer</div>
    </header>

    <main class="card">
      <section class="section">
        <h2>問題</h2>
        <div class="problem-frame">
          <img src="./mondaiimg/daisu01.png" alt="思考力問題・代数（問題画像）">
        </div>

        <div class="actions">
          <button id="askBtn" type="button">ChatGPTに聞く</button>
          <div class="hint">押すと別タブで開きます。</div>
        </div>
      </section>
    </main>

    <footer>© Shinko Keirin Group</footer>
  </div>

  <script>
    // ここをChatGPTの共有URLに差し替えてください
    const SHARE_URL = 'https://chatgpt.com/share/69e9887c-7c8c-8320-b500-7b2e6c911a95';

    document.getElementById('askBtn').addEventListener('click', () => {
      // ポップアップブロック対策：ユーザー操作（クリック）直後にopenする
      window.open(SHARE_URL, '_blank', 'noopener,noreferrer');
    });
  </script>
</body>
</html>
